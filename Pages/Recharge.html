<!doctype html>
<html lang="en">

  <body>

    <!-- Vertical Timeline Navigation -->

          ></a>
        </li>
        <li class="timeline-item">
          <a
            href="#indian-valley-precip"
            class="timeline-link"
            data-label="Indian Valley Precip"
            aria-label="Jump to Indian Valley Precipitation"
          ></a>
        </li>
        <li class="timeline-item">
          <a
            href="#davis-precip"
            class="timeline-link"
            data-label="Davis Precip"
            aria-label="Jump to Davis Precipitation"
          ></a>
        </li>
        <li class="timeline-item">
          <a
            href="#precip-forecast"
            class="timeline-link"
            data-label="Precip Forecast"
            aria-label="Jump to Precipitation Forecast"
          ></a>
        </li>
        <!-- <li class="timeline-item">
                <a href="#clear-lake-spill" class="timeline-link" data-label="Clear Lake Spill" aria-label="Jump to Clear Lake Spill"></a>
            </li>
            <li class="timeline-item">
                <a href="#indian-valley-spill" class="timeline-link" data-label="Indian Valley Spill" aria-label="Jump to Indian Valley Spill"></a>
            </li> -->
        <li class="timeline-item">
          <a
            href="#cache-creek-flow"
            class="timeline-link"
            data-label="Cache Creek Flow"
            aria-label="Jump to Cache Creek Flow"
          ></a>
        </li>
      </ul>
      <button
        class="timeline-toggle"
        aria-label="Toggle all labels"
        title="Show/hide all labels"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"
          />
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
          />
        </svg>
      </button>
    </nav>

    <!-- layout has timeline -->
    <div class="layout has-timeline">
      <div class="container page-content">
        <!-- Clear Lake Cumulative Precipitation -->
        <div
          id="clear-lake-precip"
          class="chart"
          data-title="Clear Lake Cumulative Precipitation"
          data-subtitle="Water Year: {wyRange}"
          data-stacked="false"
          data-source-units="in"
          data-units="in"
          data-series='[
                { "csv": "../Data/Cumulative Precipitation-Clear Lake.csv", "name": "Forecast", "y": "Baseline", "type": "line"},
                { "csv": "../Data/1991-2020 Cumalitive Avg Precipitation.csv", "name": "1991-2020 Average", "y": "Clear Lake", "type": "area", "dashFromCurrentMonth": false}
            ]'
        ></div>

        <!-- Indian Valley Precipitation -->
        <div
          id="indian-valley-precip"
          class="chart"
          data-title="Indian Valley Cumulative Precipitation"
          data-subtitle="Water Year: {wyRange}"
          data-stacked="false"
          data-source-units="in"
          data-units="in"
          data-series='[
                { "csv": "../Data/Cumulative Precipitation-Indian Valley.csv", "name": "Forecast", "y": "Baseline", "type": "line"},
                { "csv": "../Data/1991-2020 Cumalitive Avg Precipitation.csv", "name": "1991-2020 Average", "y": "Middle Indian Valley", "type": "area", "dashFromCurrentMonth": false}
            ]'
        ></div>

        <!-- Davis Catch Precipitation -->
        <div
          id="davis-precip"
          class="chart"
          data-title="Davis Cumulative Precipitation"
          data-subtitle="Water Year: {wyRange}"
          data-stacked="false"
          data-source-units="in"
          data-units="in"
          data-series='[
                { "csv": "../Data/Cumulative Precipitation-Davis Catch.csv", "name": "Forecast", "y": "Baseline", "type": "line"},
                { "csv": "../Data/1991-2020 Cumalitive Avg Precipitation.csv", "name": "1991-2020 Average", "y": "Davis catch", "type": "area","dashFromCurrentMonth": false}
            ]'
        ></div>

        <!-- Monthly inflows to reservoirs and precipitation on same plot?  -->
        <div
          id="precip-forecast"
          class="chart"
          data-title="Monthly Precipitation"
          data-subtitle="Water Year: {wyRange}"
          data-stacked="false"
          data-units="IN"
          data-series='[
                { "csv": "../Data/Precipitation-Clear Lake Monthly.csv", "name": "Clear Lake Precipitation", "y": "Baseline", "type": "bar"},
                { "csv": "../Data/Precipitation-Indian Valley Monthly.csv", "name": "Indian Valley Precipitation", "y": "Baseline", "type": "bar"}
            ]'
        ></div>

        <!-- Spills - REMOVE FOR NOW -->
        <!-- <div
            id="clear-lake-spill"
            class="chart"
            data-title="Clear Lake Spill"
            data-subtitle="Water Year: {wyRange}"
            data-stacked="false"
            data-source-units="AF"
            data-series='[
                { "csv": "../Data/Reservoir Spills-Clear Lake.csv", "name": "Forecast", "y": "Clear Lake (/AF)", "type": "bar"}
            ]'
        ></div>

        <div
            id="indian-valley-spill"
            class="chart"
            data-title="Indian Valley Spill"
            data-subtitle="Water Year: {wyRange}"
            data-stacked="false"

            data-series='[
                { "csv": "../Data/Reservoir Spills-Indian Valley.csv", "name": "Forecast", "y": "Indian Valley (/AF)", "type": "bar"}
            ]'
        ></div> -->

        <!-- Flow at Yolo Gage in cfs and a line at 50 cfs -->
        <!-- Add the area chart with average -->
        <div
          id="cache-creek-flow"
          class="chart"
          data-title="Cache Creek Flow at Yolo"
          data-subtitle="Water Year: {wyRange}"
          data-stacked="false"
          data-units="cfs"
          data-source-units="cfs"
          data-series='[
                { "csv": "../Data/1991-2020 Cumalitive Avg Flow.csv", "name": "1991-2020 Average", "y": "Cache Creek at Yolo", "type": "area", "dashFromCurrentMonth": false},
                { "csv": "../Data/Cache Creek Flow at Yolo Gauge.csv", "name": "Yolo WY {current year} Forecast", "y": "Baseline", "type": "bar"},
                { "csv": "../Data/50cfs Time Series.csv", "name": "50 cfs Recharge Threshold", "y": "", "type": "line", "dashFromCurrentMonth": false} 
            ]'
        ></div>
      </div>
    </div>
    <br /><br />
    <!-- </main> -->

    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="../header-loader.js"></script>
    <script src="../parse-data.js"></script>

    <!-- Timeline Active State Script -->
    <script>
      const observerOptions = {
        root: null,
        rootMargin: "-30% 0px -30% 0px",
        threshold: 0,
      };

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            document.querySelectorAll(".timeline-link").forEach((link) => {
              link.classList.remove("active");
            });

            const id = entry.target.getAttribute("id");
            const activeLink = document.querySelector(
              `.timeline-link[href="#${id}"]`,
            );
            if (activeLink) {
              activeLink.classList.add("active");
            }
          }
        });
      }, observerOptions);

      const handleScroll = () => {
        const scrolledToBottom =
          window.innerHeight + window.scrollY >=
          document.body.offsetHeight - 100;
        if (scrolledToBottom) {
          document.querySelectorAll(".timeline-link").forEach((link) => {
            link.classList.remove("active");
          });
          const lastLink = document.querySelector(".timeline-link:last-child");
          if (lastLink) {
            lastLink.classList.add("active");
          }
        }
      };

      document.addEventListener("DOMContentLoaded", () => {
        document
          .querySelectorAll(".chart[id], .container[id]")
          .forEach((section) => {
            observer.observe(section);
          });

        window.addEventListener("scroll", handleScroll);

        const timeline = document.querySelector(".chart-timeline");
        const toggleBtn = document.querySelector(".timeline-toggle");

        if (toggleBtn && timeline) {
          toggleBtn.addEventListener("click", (e) => {
            e.preventDefault();
            timeline.classList.toggle("show-all-labels");
            toggleBtn.classList.toggle("active");
          });
        }
      });
    </script>
  </body>
</html>
