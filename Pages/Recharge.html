<!doctype html>
<html lang="en">
  <head>
    <link
      rel="stylesheet"
      href="../styles.css"
    />
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <title>Yolo County Forecasting</title>
  </head>

  <body>
    <div data-site-header-placeholder></div>

    <div class="layout">
      <div class="container page-content">
        <!-- Clear Lake Cumulative Precipitation -->
        <div
          id="clear-lake-precip"
          class="chart"
          data-title="Clear Lake Cumulative Precipitation"
          data-subtitle="Water Year: {wyRange}"
          data-stacked="false"
          data-source-units="in"
          data-units="in"
          data-series='[
                { "csv": "../Data/Cumulative Precipitation-Clear Lake.csv", "name": "Forecast", "y": "Baseline", "type": "line"},
                { "csv": "../Data/1991-2020 Cumalitive Avg Precipitation.csv", "name": "1991-2020 Average", "y": "Clear Lake", "type": "area", "dashFromCurrentMonth": false}
            ]'
        ></div>

        <!-- Indian Valley Precipitation -->
        <div
          id="indian-valley-precip"
          class="chart"
          data-title="Indian Valley Cumulative Precipitation"
          data-subtitle="Water Year: {wyRange}"
          data-stacked="false"
          data-source-units="in"
          data-units="in"
          data-series='[
                { "csv": "../Data/Cumulative Precipitation-Indian Valley.csv", "name": "Forecast", "y": "Baseline", "type": "line"},
                { "csv": "../Data/1991-2020 Cumalitive Avg Precipitation.csv", "name": "1991-2020 Average", "y": "Middle Indian Valley", "type": "area", "dashFromCurrentMonth": false}
            ]'
        ></div>

        <!-- Davis Catch Precipitation -->
        <div
          id="davis-precip"
          class="chart"
          data-title="Davis Cumulative Precipitation"
          data-subtitle="Water Year: {wyRange}"
          data-stacked="false"
          data-source-units="in"
          data-units="in"
          data-series='[
                { "csv": "../Data/Cumulative Precipitation-Davis Catch.csv", "name": "Forecast", "y": "Baseline", "type": "line"},
                { "csv": "../Data/1991-2020 Cumalitive Avg Precipitation.csv", "name": "1991-2020 Average", "y": "Davis catch", "type": "area","dashFromCurrentMonth": false}
            ]'
        ></div>

        <!-- Monthly inflows to reservoirs and precipitation on same plot?  -->
        <div
          id="precip-forecast"
          class="chart"
          data-title="Monthly Precipitation"
          data-subtitle="Water Year: {wyRange}"
          data-stacked="false"
          data-units="IN"
          data-series='[
                { "csv": "../Data/Precipitation-Clear Lake Monthly.csv", "name": "Clear Lake Precipitation", "y": "Baseline", "type": "bar"},
                { "csv": "../Data/Precipitation-Indian Valley Monthly.csv", "name": "Indian Valley Precipitation", "y": "Baseline", "type": "bar"}
            ]'
        ></div>

        <!-- Spills - REMOVE FOR NOW -->
        <!-- <div
            id="clear-lake-spill"
            class="chart"
            data-title="Clear Lake Spill"
            data-subtitle="Water Year: {wyRange}"
            data-stacked="false"
            data-source-units="AF"
            data-series='[
                { "csv": "../Data/Reservoir Spills-Clear Lake.csv", "name": "Forecast", "y": "Clear Lake (/AF)", "type": "bar"}
            ]'
        ></div>

        <div
            id="indian-valley-spill"
            class="chart"
            data-title="Indian Valley Spill"
            data-subtitle="Water Year: {wyRange}"
            data-stacked="false"

            data-series='[
                { "csv": "../Data/Reservoir Spills-Indian Valley.csv", "name": "Forecast", "y": "Indian Valley (/AF)", "type": "bar"}
            ]'
        ></div> -->

        <!-- Flow at Yolo Gage in cfs and a line at 50 cfs -->
        <!-- Add the area chart with average -->
        <div
          id="cache-creek-flow"
          class="chart"
          data-title="Cache Creek Flow at Yolo"
          data-subtitle="Water Year: {wyRange}"
          data-stacked="false"
          data-units="cfs"
          data-source-units="cfs"
          data-series='[
                { "csv": "../Data/1991-2020 Cumalitive Avg Flow.csv", "name": "1991-2020 Average", "y": "Cache Creek at Yolo", "type": "area", "dashFromCurrentMonth": false},
                { "csv": "../Data/Cache Creek Flow at Yolo Gauge.csv", "name": "Yolo WY {current year} Forecast", "y": "Baseline", "type": "bar"},
                { "csv": "../Data/50cfs Time Series.csv", "name": "50 cfs Recharge Threshold", "y": "", "type": "line", "dashFromCurrentMonth": false} 
            ]'
        ></div>
      </div>
    </div>
    <br /><br />
    <!-- </main> -->

    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="../header-loader.js"></script>
    <script src="../parse-data.js"></script>
  </body>
</html>
