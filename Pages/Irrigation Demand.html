<!doctype html>
<html lang="en">
  <head>
    <link
      rel="stylesheet"
      href="../styles.css"
    />
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <title>Yolo County Forecasting</title>
  </head>

  <body>
    <div data-site-header-placeholder></div>

    <!-- Fix Stacked + Non-stacked bug and add this line back -->
    <div class="layout">
      <div
        id="summary-data"
        class="container"
      >
        <div class="single-value-grid">
          <div
            class="single-value"
            data-label="Diversions: Winters Canal"
            data-csv="../Data/Diversions-Winters Canal.csv"
            data-col="Sum"
            data-sumWY="true"
            data-units="TAF"
          ></div>

          <div
            class="single-value"
            data-label="Diversions: West Adams Canal"
            data-csv="../Data/Diversions-West Adams Canal.csv"
            data-col="Sum"
            data-month="Apr"
            data-sumWY="true"
            data-units="TAF"
          ></div>

          <div
            class="single-value"
            data-label="Reservoir Release: Clear Lake"
            data-csv="../Data/Reservoir Release-Clear Lake.csv"
            data-col="Baseline"
            data-sumWY="true"
            data-units="TAF"
          ></div>

          <div
            class="single-value"
            data-label="Reservoir Release: Indian Valley"
            data-csv="../Data/Reservoir Release-Indian Valley.csv"
            data-col="Baseline"
            data-sumWY="true"
            data-units="TAF"
          ></div>
        </div>
      </div>

      <div class="container main page-content">

        <!-- Capay Dam -->
        <div
          id="capay-dam"
          class="chart"
          data-title="Capay Dam Diversions"
          data-subtitle="Water Year: {wyRange}"
          data-stacked="true"
          data-series='[
                { "csv": "../Data/Diversions-West Adams Canal.csv", "name": "West Adams Canal", "y": "Sum", "type": "area","stack": true },
                { "csv": "../Data/Diversions-Winters Canal.csv", "name": "Winters Canal", "y": "Sum", "type": "area","stack": true },
                { "csv": "../Data/YCFC Farmgate Deliveries.csv", "name": "YCFC Farmgate Deliveries", "y": "Sum", "type": "line", "dashFromCurrentMonth": true, "stack": false, "color": "#ffe100" }
            ]'
        ></div>

        <!-- Capay Dam Mar-Sep Diversions single value -->
        <div
          class="single-value"
          data-label="Total Diversions (Mar - Sep {current})"
          data-csv="../Data/Diversions-Capay Dam Mar-Sep.csv"
          data-col="Sum"
          data-year="current"
          data-units="TAF"
          data-in-chart="#capay-dam"
        ></div>

        <!-- How to put this next to total diversions number? -->
        <div
          class="single-value"
          data-label="Total Farmgate Deliveries (Mar - Sep {current})"
          data-csv="../Data/YCFC Farmgate Deliveries Mar-Sep.csv"
          data-col="Sum"
          data-year="current"
          data-units="TAF"
          data-in-chart="#capay-dam"
        ></div>



        <!-- Reservoir Releases -->
        <div
          id="reservoir-releases"
          class="chart"
          data-title="Reservoir Releases"
          data-subtitle="Water Year: {wyRange}"
          data-stacked="true"
          data-note="All values are simulated"
          data-series='[
                    { "csv": "../Data/Reservoir Release-Irrigation.csv", "name": "Total Reservoir Releases for Irrigation", "y": "Baseline", "type": "bar", "stack": true },
                    { "csv": "../Data/Reservoir Release-Spill.csv", "name": "Total Reservoir Spills", "y": "Baseline", "type": "bar", "stack": true }
                ]'
        ></div>
      </div>
    </div>

    <br /><br />
    <!-- </main> -->

    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="../header-loader.js"></script>
    <script src="../parse-data.js"></script>
  </body>
</html>
