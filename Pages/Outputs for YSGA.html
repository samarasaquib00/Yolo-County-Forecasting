<!doctype html>
<html lang="en">
  <head>
    <link
      rel="stylesheet"
      href="../styles.css"
    />
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <title>Yolo County Forecasting</title>
  </head>

  <body>
    <div data-site-header-placeholder></div>

    <!-- Vertical Timeline Navigation -->
    <nav
      class="chart-timeline"
      aria-label="Chart navigation"
    >
      <ul class="timeline-list">
        <li class="timeline-item">
          <a
            href="#groundwater-storage"
            class="timeline-link"
            data-label="Groundwater Storage"
            aria-label="Jump to Groundwater Storage"
          ></a>
        </li>
        <li class="timeline-item">
          <a
            href="#data"
            class="timeline-link"
            data-label="Data"
            aria-label="Jump to Data"
          ></a>
        </li>
      </ul>
      <button
        class="timeline-toggle"
        aria-label="Toggle all labels"
        title="Show/hide all labels"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"
          />
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
          />
        </svg>
      </button>
    </nav>

    <!-- Clear Lake Precipitation -->
    <!-- <div  
        class="chart"
        data-title="Clear Lake Precipitation"
        data-subtitle="Water Year: {wyRange}"
        data-stacked="false"
        data-source-units="in"
        data-units="in"
        data-series='[
            { "csv": "../Data/Cumulative Precip-Clear Lake.csv", "name": "Forecast", "y": "Baseline", "type": "line"},
            { "csv": "../Data/1991-2020 Cumalitive Avg Precipitation.csv", "name": "1991-2020 Average", "y": "Clear Lake", "type": "area", "dashFromCurrentMonth": false}
        ]'
    ></div> -->

    <div class="layout has-timeline">
      <div class="container page-content">

        <!-- Plotly -->


        <!-- Groundwater Storage -->
        <div
          id="groundwater-storage"
          class="chart"
          data-title="Monthly Change in Groundwater Storage"
          data-subtitle="Water Year: {wyRange}"
          data-stacked="false"
          data-note="Displays the change in storage from previous month. All values are simulated."
          data-series='[
                    { "csv": "../Data/Groundwater Storage.csv", "name": "Storage Change", "y": "Baseline", "type": "line", "dashFromCurrentMonth": false, "monthlyChange": true }
                ]'
        ></div>


        <!--  Representative Monitoring Wells - Average Depth to Water -->
        <!-- Comment out when done -->
        <!-- y axis name: Average Depth (ft) -->
        <div
          id="representative-monitoring-wells"
          class="chart"
          data-title="Representative Monitoring Wells - Average Depth to Water"
          data-subtitle="Water Year: {wyRange}"
          data-stacked="false"
          data-inverse-y-axis="true"
          data-y-axis-name="Depth to Water (ft)"
          data-condition-bands="true"
          data-note="All data is simulated."
          data-series='[
                    { "csv": "../Data/RMW Avg DTW.csv", "name": "Average Groundwater Level", "y": "Depth to Water", "units": "ft", "sourceUnits": "ft", "type": "line", "dashFromCurrentMonth": false, "color": "red"}
                ]'
        ></div>

        <!-- Table of Budget Numbers -->
        <!-- If data-year is empty, assume current water year -->
        <div id="data">
          <div class="single-value-grid">
            <div
              class="single-value"
              data-label="Total Ag Demand"
              data-csv="../Data/Total Ag Demand.csv"
              data-col="Baseline"
              data-units="TAF"
            ></div>

            <div
              class="single-value"
              data-label="Ag GW Extraction"
              data-csv="../Data/Ag GW Extraction.csv"
              data-col="Baseline"
              data-units="TAF"
            ></div>

            <div
              class="single-value"
              data-label="Ag SW Diversions"
              data-csv="../Data/Ag SW Diversions.csv"
              data-col="Baseline"
              data-units="TAF"
            ></div>

            <div
              class="single-value"
              data-label="Actual ET"
              data-csv="../Data/ETActual (including irrigation).csv"
              data-col="Baseline"
              data-units="TAF"
            ></div>
          </div>

          <br />

          <div class="single-value-grid">
            <div
              class="single-value"
              data-label="Total Groundwater Extraction"
              data-csv="../Data/Total GW Extraction.csv"
              data-col="Baseline"
              data-units="TAF"
            ></div>

            <div
              class="single-value"
              data-label="Total SW Diversions"
              data-csv="../Data/Total SW Diversions.csv"
              data-col="Baseline"
              data-units="TAF"
            ></div>

            <div
              class="single-value"
              data-label="Urban GW Extractions"
              data-csv="../Data/Urban GW Extraction.csv"
              data-col="Baseline"
              data-units="TAF"
            ></div>

            <div
              class="single-value"
              data-label="Urban SW Diversions"
              data-csv="../Data/Urban SW Diversions.csv"
              data-col="Baseline"
              data-units="TAF"
            ></div>
          </div>
        </div>
      </div>

      <br /><br />

      <!-- Change in GW Storage – use Forecast Outputs\Groundwater Storage – use Sep of forecast year minus Sep of year before forecast year  -->
      <div class="container">
        <div class="single-value-grid">
          <div
            class="single-value"
            data-key="GW_Current"
            data-label="{year} End of Year Storage"
            data-csv="../Data/Groundwater Storage.csv"
            data-col="Baseline"
            data-month="Sep"
            data-year="current"
            data-units="TAF"
          ></div>

          <!-- Add Previous field for single values -->
          <div
            class="single-value"
            data-key="GW_Previous"
            data-label="{prevyear} End of Year Storage"
            data-csv="../Data/Groundwater Storage.csv"
            data-col="Baseline"
            data-month="Sep"
            data-year="previous"
            data-units="TAF"
          ></div>

          <div
            class="single-value"
            data-key="diff"
            data-label="Change in Storage"
            data-diff="GW_Current,GW_Previous"
            data-units="TAF"
          ></div>
        </div>
      </div>
    </div>

    <br /><br />
    <!-- </main> -->

    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="../header-loader.js"></script>
    <script src="../parse-data.js"></script>

    <!-- Timeline Active State Script -->
    <script>
      const observerOptions = {
        root: null,
        rootMargin: "-30% 0px -30% 0px",
        threshold: 0,
      };

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            document.querySelectorAll(".timeline-link").forEach((link) => {
              link.classList.remove("active");
            });

            const id = entry.target.getAttribute("id");
            const activeLink = document.querySelector(
              `.timeline-link[href="#${id}"]`,
            );
            if (activeLink) {
              activeLink.classList.add("active");
            }
          }
        });
      }, observerOptions);

      const handleScroll = () => {
        const scrolledToBottom =
          window.innerHeight + window.scrollY >=
          document.body.offsetHeight - 100;
        if (scrolledToBottom) {
          document.querySelectorAll(".timeline-link").forEach((link) => {
            link.classList.remove("active");
          });
          const lastLink = document.querySelector(
            '.timeline-link[href="#data"]',
          );
          if (lastLink) {
            lastLink.classList.add("active");
          }
        }
      };

      document.addEventListener("DOMContentLoaded", () => {
        document
          .querySelectorAll(".chart[id], .container[id]")
          .forEach((section) => {
            observer.observe(section);
          });

        window.addEventListener("scroll", handleScroll);

        const timeline = document.querySelector(".chart-timeline");
        const toggleBtn = document.querySelector(".timeline-toggle");

        if (toggleBtn && timeline) {
          toggleBtn.addEventListener("click", (e) => {
            e.preventDefault();
            timeline.classList.toggle("show-all-labels");
            toggleBtn.classList.toggle("active");
          });
        }
      });
    </script>
  </body>
</html>
